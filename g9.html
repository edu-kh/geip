<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<Link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet"></Link>

<link href="https://fonts.googleapis.com/css2?family=Moul&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Battambang&family=Moul&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<title>Geip 7-9</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #2A394C;
        margin: 0;
        font-family: "Battambang", system-ui;
    }
    header {
        position: sticky;
        top: 0;
        background: #2A394C;
        padding: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        z-index: 10;
        font-family: "Battambang", system-ui;
        
    }
    .container {
        display: flex;
        gap: 20px;
        padding: 15px;
        font-family: "Battambang", system-ui;
         border-radius: 20pX;
    }
    .panel {
        background: #2c3e57;
        border-radius: 10px;
        padding: 0;
        flex: 1;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        border-radius: 20pX;

        color: #8efdf0;
    }
    .panel-list{
         max-height: calc(50vh - 80px);
       border-radius: 50pX;
    }
    .student-header {
        position: sticky;
        top: 0;
        background: #2c3e57;
        padding: 10px;
        z-index: 5;
        border-bottom: 1px solid #ddd;
        font-family: "Battambang", system-ui;
        display: flex;
        border-radius: 20pX;
    }
    .student-list {
        overflow-y: auto;
        flex: 1;
        padding: 5px;
        border-radius: 20pX;
    }
    .student-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      border-bottom: 1px solid #bbb;
      background: hsla(216, 68%, 88%, 0.761);
      border-radius: 6px;
      margin-bottom: 3px;
      font-family: "Battambang", system-ui;
      color: black
    }
    .btn-blue {
        background: #007bff;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-family: "Battambang", system-ui;
    }
    .btn-red {
        background: #bb5656;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-family: "Battambang", system-ui;
    }
    .btn-gray {
        background: #e0e0e0;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        color: #007bff;
        font-family: "Battambang", system-ui;
    }
    button:hover {
      transform: translateY(-2px);
      background-color: rgb(19, 80, 54);
      color: white;
    }
    button a{
      color: #007bff;
      text-decoration: none;
    }
    button a:hover{
        color: #f5f6fa;
    }
    .score-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
    }
    .score-box {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    input[type="number"], input[type="text"], select {
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 100%;
        box-sizing: border-box;
        font-family: "Battambang", system-ui;
        font-size: 1rem;
        background: hsla(216, 50%, 96%, 0.761);
    }
    @media(max-width: 768px) {
        .container { flex-direction: column; }
        header { flex-wrap: wrap; }
    }
    #subjectQuick{
        height: 0;
        width: 0;
        opacity: 0;
    }
    #studentInfoPanel{
        display:none;
    }
    .class-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        max-height: 220px;
        overflow-y: auto;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 10px;
        background: white;
    }
    .class-option {
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        background: #f1f1f1;
        cursor: pointer;
        transition: 0.2s;
        font-family: "Battambang", system-ui;
    }
    .class-option:hover {
        background: #007bff;
        color: white;
    }
    #monthSelect {
        display: none;
    }
    .class-grid{
        transition: all 0.3s ease;
    }
</style>
</head> 
<body>

<header>
    <label style="width:100%; color: #8efdf0;"><span>ថ្នាក់ទី៧ ដល់ទី៩ <button class="btn-gray"> <a href="index.html" style="color: green; list-style-type: none;" >🏡ទំព័រដើម</a></button></span>
         <input type="hidden" id="monthSelect" value="7-9">
         <button class="btn-gray" id="backToList" style="display:none;">⬅️ថយក្រោយ</button>
    <span id="saveStatush" style="margin-left:10px;color:green;font-weight:bold;"></span>
    </label>
   
    <select id="subjectQuick"></select>  
    <span id="quickScore" placeholder="" style="width: 0px;"> </span>
    <h4 id="selectedStudenth" style="padding: 0px; margin-top: -5px; margin-bottom: -5px; overflow-y: auto; font-size: 0px; border: none;"></h4>
    <span id="saveListScores"> </span>
    <span id="applyQuick"></span>
    <button class="btn-gray" id="backToList" style="display:none;">⬅️ថយក្រោយ</button>
    <span id="saveStatush" style="margin-left:10px;color:green;font-weight:bold;"></span>
</header>

<div class="container">
    <div class="panel panel-list" style="flex:1;">
        <div class="student-header">
            <input type="text" id="searchName" placeholder="ស្វែងរកឈ្មោះសិស្ស..." style=" margin-bottom:5px;">
            <button class="btn-blue" id="reloadBtn" style="margin-top:5px;">Reload</button>
        </div>
        <div id="studentList" class="student-list"></div>
    </div>

    <div class="panel" id="studentInfoPanel">
        <div class="panel-top" style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #ddd;">
            <div style="display:flex;align-items:center;gap:8px;"><h4 id="selectedStudent">គ្មានឈ្មោះសិស្ស</h4></div>
            <div style="display:flex; gap:5px;">
                <button class="btn-gray" id="prevStudent"><i class="fa fa-chevron-left"></i></button>
                <button class="btn-gray" id="nextStudent"><i class="fa fa-chevron-right"></i></button>
            </div>
        </div>
       
        <div style="padding: 15px; flex: 1; overflow-y: auto;">
            <div id="scoresGrid" class="score-grid"></div>
        </div>
        <div style="padding: 15px; border-top: 1px solid #ddd; position: sticky; bottom: 0px; background: #2c3e57;">
            <button class="btn-gray" id="resetBtn">សម្អាត</button>
            <button class="btn-blue" id="saveBtn">រក្សាទុក</button>
            <span id="saveStatus" style="margin-left:10px;color:green;font-weight:bold;"></span>
        </div>
    </div>
</div>
<div id="successPopup" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:9999;
    justify-content:center;
    align-items:center;
">
    <div style="
        background:white;
        padding:25px;
        border-radius:15px;
        width:300px;
        text-align:center;
        font-family:'Battambang', system-ui;
        box-shadow:0 5px 20px rgba(0,0,0,0.2);
    ">
        <h2 style="color:green;">✅ជោគជ័យ💯%</h2>
        <p id="successMessage" ></p>
        <button id="closePopupBtn" class="btn-red" style="margin-top:15px;">
            បិទផ្ទាំង
        </button>
    </div>
</div>

<script>
const SHEET_API_BASE = 'https://script.google.com/macros/s/AKfycbykocE9owoUFQRTE4wOFM_6CWD_MbMXapaCZtd8bInueNb1A9aryaKzWphbxgErECsFXg/exec';

const SUBJECTS = [
   "ភេទ", "ថ្ងៃខែឆ្នាំកំណើត", "ថ្នាក់រៀនទី",
   "PISA", "ឈ្មោះសាលារៀនឆ្នាំមុន", "ចំណុះឬក្រៅ",
   "មកពីសាលា", "ប្រភេទសិស្ស", "លក្ខខណ្ឌ",
   "ប្រភេទពិការភាព", "ឧបករណ៍ជំនួយ", "បណ្ណក្រីក្រ", "អាហារូបករណ៍", "កំព្រា",
   "លេខសំបុត្រកំណើត", "ចំណាកស្រុក(ឪពុកម្តាយ)", "ហឹង្សាក្នុងគ្រួសារ", "ផ្ទះសំបែង(ជម្រក)", 
    "ឈ្មោះជំងឺ(បើមាន)", "មធ្យោបាយព្យាបាល",
   "បញ្ហាសុខភាពសិស្ស", "អ្នកផ្ដល់ការព្យាបាល", "ការចូលរួមអាណាព្យាបាល", "ស្ថានភាពរស់នៅ",
   "សំណូមពរអាណាព្យាបាល", "ក្រុមប្រឹក្សាយុវជន-កុមារ", "ទម្ងន់(គីឡូក្រាម)", "កម្ពស់(ម៉ែត្រ)" ,"បងប្អូនបង្កើត(ឈ្មោះ-ភេទ-ឆ្នាំកំណើត)",  "ប្រាក់ចំណូលគ្រួសារ/១ខែ($)"
];

let currentStudentId = null;
let currentStudentName = null;
let studentNames = []; 
let currentIndex = -1;
let scores = {};
const monthSelect = document.getElementById('monthSelect');

function formatDateOnly(dateValue){
    if(!dateValue) return '';
    const d = new Date(dateValue);
    if(isNaN(d)) return String(dateValue);
    const day = String(d.getDate()).padStart(2,'0');
    const month = String(d.getMonth()+1).padStart(2,'0');
    const year = d.getFullYear();
    return `${day}-${month}-${year}`;
}

function loadStudents() {
    const reloadBtn = document.getElementById('reloadBtn');
    const studentListEl = document.getElementById('studentList');

    reloadBtn.disabled = true;
    reloadBtn.textContent = 'Loading'; 
    studentListEl.innerHTML = '<div style="padding:10px; color:#CCC; font-size: 1rem">កំពុងទាញឈ្មោះសិស្ស! សូមរង់ចាំ...</div>';

    studentNames = [];
    currentIndex = -1;

    fetch(`${SHEET_API_BASE}?action=getStudents&month=${monthSelect.value}`)
        .then(res => res.json())
        .then(data => {
            studentNames = data; 
            studentListEl.innerHTML = ''; 

            data.forEach(student => {
                let div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `
                    <span style="flex:1;">${student.name}</span>
                     <button class="btn-gray"><i class="fas fa-pencil-alt"></i> បំពេញ/កែប្រែ</button>
                `;

                div.querySelector('button').onclick = () => {
                    currentIndex = studentNames.findIndex(s => s.id === student.id);
                    selectStudent(student.id, student.name);
                };

                studentListEl.appendChild(div);
            });
        })
        .catch(err => {
            console.error(err);
            studentListEl.innerHTML = '<div style="padding:10px; color:red;"> សូមចុច Reload⚠️</div>';
        })
        .finally(() => {
            reloadBtn.disabled = false;
            reloadBtn.textContent = 'Reload';
        });
}

function showSuccessPopup() {
    const popup = document.getElementById('successPopup');
    popup.style.display = 'flex';
}

document.getElementById('closePopupBtn').onclick = () => {
    document.getElementById('successPopup').style.display = 'none';
};

document.getElementById('prevStudent').onclick = () => {
    if (!studentNames.length) return;
    currentIndex = currentIndex > 0 ? currentIndex - 1 : studentNames.length - 1;
    selectStudent(studentNames[currentIndex].id, studentNames[currentIndex].name);
};

document.getElementById('nextStudent').onclick = () => {
    if (!studentNames.length) return;
    currentIndex = currentIndex < studentNames.length - 1 ? currentIndex + 1 : 0;
    selectStudent(studentNames[currentIndex].id, studentNames[currentIndex].name);
};

document.getElementById('monthSelect').addEventListener('input', () => {
    document.getElementById('studentInfoPanel').style.display = 'none';
    loadStudents();
    document.getElementById('selectedStudent').textContent = 'គ្មានឈ្មោះសិស្ស';
    currentStudentId = null;
    currentStudentName = null;
    scores = {};
    renderScores();
});

function selectStudent(id, name) {
    // 1. Hide the list and show the information panel
    document.querySelector('.panel-list').style.display = 'none';
    document.getElementById('studentInfoPanel').style.display = 'flex';
    document.getElementById('backToList').style.display = 'inline-block';
    
    currentStudentId = id;
    currentStudentName = name;
    
    document.getElementById('selectedStudenth').textContent = name;
    document.getElementById('selectedStudent').textContent = name + " (" + id + ")";
    scores = {};
   
    document.getElementById('quickScore').value = '';
    
    // 2. Clear the form and show a temporary 3-second reload/loading message
    let grid = document.getElementById('scoresGrid');
    grid.innerHTML = '<div id="formLoadingMsg" style="padding:20px; color:#8efdf0; font-size: 1.2rem; text-align:center;"><i class="fa fa-spinner fa-spin"></i> កំពុងទាញយកទិន្នន័យសូមរង់ចាំ ៣វិនាទី</div>';
    
    // Hide action buttons while loading
    document.getElementById('saveBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'none';
    
    // 3. Fetch data and enforce a strict 3-second delay minimum
    Promise.all([
        fetch(`${SHEET_API_BASE}?action=getScores&month=${monthSelect.value}&studentId=${encodeURIComponent(id)}`).then(res => res.json()),
        new Promise(resolve => setTimeout(resolve, 3000)) // Enforces the 3 second delay
    ])
    .then(([data]) => {
        // 4. Data is fetched and 3 seconds have passed -> Render the form
        scores = data.scores || {};
        if(!scores["ឈ្មោះសាលារៀនឆ្នាំមុន"]) scores["ឈ្មោះសាលារៀនឆ្នាំមុន"] = "";
        applySchoolLogic();
        
        // Restore action buttons and render data
        document.getElementById('saveBtn').style.display = 'inline-block';
        document.getElementById('resetBtn').style.display = 'inline-block';
        renderScores();
    })
    .catch(err => {
        console.error(err);
        grid.innerHTML = '<div style="padding:20px; color:red; text-align:center;">ការទាញទិន្នន័យបរាជ័យ! សូមព្យាយាមម្តងទៀត។</div>';
    });
}

// មុខងារសម្រាប់គ្រប់គ្រងលក្ខខណ្ឌស្វ័យប្រវត្តិតាមជម្រើសឈ្មោះសាលា
function applySchoolLogic() {
    let school = scores["ឈ្មោះសាលារៀនឆ្នាំមុន"] || "";
    
    // បើសិនជាជ្រើសរើសយកឈ្មោះសាលាផ្សេងៗ (ក្រៅពី a, b, c) ហើយមិនមែនជាទទេ នោះចាត់ទុកជា 'other'
    let isOther = school !== "" && school !== "បឋមផ្សារលើ" && school !== "បឋមមិត្តភាព" && school !== "វិ.ហសមិត្តភាព";
    
    if (school === "បឋមផ្សារលើ" || school === "បឋមមិត្តភាព") {
        scores["ចំណុះឬក្រៅ"] = "បឋមចំណុះ";
        scores["មកពីសាលា"] = "សាលាគោលដៅ";
    } else if (school === "វិ.ហសមិត្តភាព") {
        scores["ចំណុះឬក្រៅ"] = "អនុវិ.ចំណុះ";
        scores["មកពីសាលា"] = "សាលាគោលដៅ";
    } else if (isOther) {
        // ប្រសិនបើធ្លាប់ជ្រើសរើសយក D ឬ E រួចហើយ មិនបាច់ដូរទេ បើមិនទាន់មានឲ្យយក D
        if (scores["ចំណុះឬក្រៅ"] !== "បឋមក្រៅចំណុះ" && scores["ចំណុះឬក្រៅ"] !== "អនុវិ.ក្រៅចំណុះ") {
            scores["ចំណុះឬក្រៅ"] = "បឋមក្រៅចំណុះ"; 
        }
        scores["មកពីសាលា"] = "សាលាក្រៅគោលដៅ";
    }
}

function renderScores() {
    let grid = document.getElementById('scoresGrid');
    grid.innerHTML = '';

    // ពិនិត្យមើលថាតើឈ្មោះសាលាបច្ចុប្បន្នជាប្រភេទ 'other' ឬអត់
    let currentSchool = scores["ឈ្មោះសាលារៀនឆ្នាំមុន"] || "";
    // បើឈ្មោះសាលាមិនមែនទទេ ហើយមិនមែនជា a, b, c ឬជម្រើសបណ្តោះអាសន្ន គឺវាជាប្រភេទវាយអក្សរ (Other)
    let isOtherSchool = (currentSchool !== "" && currentSchool !== "បឋមផ្សារលើ" && currentSchool !== "បឋមមិត្តភាព" && currentSchool !== "បឋមអូរត្រេះ" && currentSchool !== "វិ.ហសមិត្តភាព") || (scores["_isOtherMode"] === true);

    SUBJECTS.forEach(sub => {
        let div = document.createElement('div');
        div.className = 'score-box';
        let fieldHTML = "";

        if(sub === "ភេទ"){
            fieldHTML = `
                <label>${sub}</label>
                <select>
                    <option value="" disabled ${!scores[sub] ? "selected" : ""}></option>
                    <option value="ប្រុស" ${scores[sub]=="ប្រុស" ? "selected" : ""}>ប្រុស</option>
                    <option value="ស្រី" ${scores[sub]=="ស្រី" ? "selected" : ""}>ស្រី</option>
                </select>
            `;
        }
        else if(sub === "PISA"){
            fieldHTML = `
                <label>${sub}</label>
                <select>
                    <option value="" disabled ${!scores[sub] ? "selected" : ""}></option>
                    <option value="✖️" ${scores[sub]=="✖️" ? "selected" : ""}>✖️</option>
                    <option value="✓" ${scores[sub]=="✓" ? "selected" : ""}>✓</option>
                </select>
            `;
        }
        else if(sub === "លក្ខខណ្ឌ"){
            fieldHTML = `
                <label>${sub}</label>

                    <option value="សុខភាពល្អ" ${scores[sub]=="សុខភាពល្អ" ? "selected" : ""}>សុខភាពល្អ</option>
                    <option value="ឈឺម្តងម្កាល" ${scores[sub]=="ឈឺម្តងម្កាល" ? "selected" : ""}>ឈឺម្តងម្កាល</option>
                    <option value="មានជំងឺប្រចាំកាយ" ${scores[sub]=="មានជំងឺប្រចាំកាយ" ? "selected" : ""}>មានជំងឺប្រចាំកាយ</option>
                   
                </select>
            `;
        }
          else if(sub === "អ្នកផ្ដល់ការព្យាបាល"){
            fieldHTML = `
                <label>${sub}</label>
                <select>
                    <option value="" disabled ${!scores[sub] ? "selected" : ""}></option>
                    <option value="មិនមាន" ${scores[sub]=="មិនមាន" ? "selected" : ""}>មិនមាន</option>
                    <option value="គ្រួសារសាច់ញាតិរ" ${scores[sub]=="គ្រួសារសាច់ញាតិ" ? "selected" : ""}>គ្រួសារសាច់ញាតិ</option>
                    <option value="សហគមន៍" ${scores[sub]=="សហគមន៍" ? "selected" : ""}>សហគមន៍</option>
                    <option value="អង្គការ" ${scores[sub]=="អង្គការ" ? "selected" : ""}>អង្គការ</option>
                    <option value="កម្មវិធីរដ្ឋាភិបាល" ${scores[sub]=="កម្មវិធីរដ្ឋាភិបាល" ? "selected" : ""}>កម្មវិធីរដ្ឋាភិបាល</option>
                   
                </select>
            `;
        }
         else if(sub === "ស្ថានភាពរស់នៅ"){
            fieldHTML = `
                <label>${sub}</label>
                <select>
                    <option value="" disabled ${!scores[sub] ? "selected" : ""}></option>
                    <option value="ជាមួយឪពុក&ជាមួយម្តាយ" ${scores[sub]=="ជាមួយឪពុក&ជាមួយម្តាយ" ? "selected" : ""}>ជាមួយឪពុក&ជាមួយម្តាយ</option>
                    <option value="ជាមួយឪពុក" ${scores[sub]=="ជាមួយឪពុក" ? "selected" : ""}>ជាមួយឪពុក</option>
                    <option value="ជាមួយម្ដាយ" ${scores[sub]=="ជាមួយម្ដាយ" ? "selected" : ""}>ជាមួយម្ដាយ</option>
                    <option value="ជាមួយអ្នកអាណាព្យាបាល" ${scores[sub]=="ជាមួយអ្នកអាណាព្យាបាល" ? "selected" : ""}>ជាមួយអ្នកអាណាព្យាបាល</option>
                    <option value="ជាមួយសាច់ញាតិ ${scores[sub]=="ជាមួយសាច់ញាតិ" ? "selected" : ""}>ជាមួយសាច់ញាតិ</option>
                   
                </select>
            `;
        }
          else if(sub === "ការចូលរួមអាណាព្យាបាល"){
            fieldHTML = `
                <label>${sub}</label>
                <select>
                    <option value="" disabled ${!scores[sub] ? "selected" : ""}></option>
                    <option value="1-ចូលរួមប្រជុំប្រចាំខែ" ${scores[sub]=="1-ចូលរួមប្រជុំប្រចាំខែ" ? "selected" : ""}>1-ចូលរួមប្រជុំប្រចាំខែ</option>
                    <option value="2-ចូលរួមជួយកូន" ${scores[sub]=="2-ចូលរួមជួយកូន" ? "selected" : ""}>2-ចូលរួមជួយកូន</option>
                    <option value="3-ចូលរួមជួយគ្រូ" ${scores[sub]=="3-ចូលរួមជួយគ្រូ" ? "selected" : ""}>3-ចូលរួមជួយគ្រូ</option>
                    <option value="4-ចូលរួមកែលម្អថ្នាក់រៀន" ${scores[sub]=="4-ចូលរួមកែលម្អថ្នាក់រៀន" ? "selected" : ""}>4-ចូលរួមកែលម្អថ្នាក់រៀន</option>
                   <option value="5-ផ្សេងៗ" ${scores[sub]=="5-ផ្សេងៗ" ? "selected" : ""}>5-ផ្សេងៗ</option>
                </select>
            `;
        }
          else if(sub === "សំណូមពរអាណាព្យាបាល"){
            fieldHTML = `
                <label>${sub}</label>
                <select>
                    <option value="" disabled ${!scores[sub] ? "selected" : ""}></option>
                    <option value="មិនមាន" ${scores[sub]=="មិនមាន" ? "selected" : ""}>មិនមាន</option>
                    <option value="ជួយណែនាំសិស្សបន្ថែម" ${scores[sub]=="ជួយណែនាំសិស្សបន្ថែម" ? "selected" : ""}>ជួយណែនាំសិស្សបន្ថែម</option>
                    <option value="ពង្រឹងការប្រឡង" ${scores[sub]=="ពង្រឹងការប្រឡង" ? "selected" : ""}>ពង្រឹងការប្រឡង</option>
                    <option value="ពង្រឹងវិន័យ" ${scores[sub]=="ពង្រឹងវិន័យ" ? "selected" : ""}>ពង្រឹងវិន័យ</option>
                    <option value="តាមដាននិងយកចិត្តទុកដាក់សិស្ស" ${scores[sub]=="តាមដាននិងយកចិត្តទុកដាក់សិស្ស" ? "selected" : ""}>តាមដាននិងយកចិត្តទុកដាក់សិស្ស</option>
                   
                   
                </select>
            `;
        }
          else if(sub === "ក្រុមប្រឹក្សាយុវជន-កុមារ"){
            fieldHTML = `
                <label>${sub}</label>
                <select>
                    <option value="" disabled ${!scores[sub] ? "selected" : ""}></option>
                    <option value="មិនមាន" ${scores[sub]=="មិនមាន" ? "selected" : ""}>មិនមាន</option>
                    <option value="ប្រធាន" ${scores[sub]=="ប្រធាន" ? "selected" : ""}>ប្រធាន</option>
                    <option value="អនុប្រធាន" ${scores[sub]=="អនុប្រធាន" ? "selected" : ""}>អនុប្រធាន</option>
                     <option value="សមាជិក" ${scores[sub]=="សមាជិក" ? "selected" : ""}>សមាជិក</option>
                   
                </select>
            `;
        }
        else {
            fieldHTML = `
                <label>${sub}</label>
                <input type="text"  value="${scores[sub] || ''}">
            `;
        }

        div.innerHTML = fieldHTML;
        let input = div.querySelector('input, select');

        input.oninput = e => {
            let value = e.target.value;
            
            if (sub === "ឈ្មោះសាលារៀនឆ្នាំមុន") {
                if (value === "other") {
                    scores[sub] = ""; // កំណត់តម្លៃទៅជាលំហទទេ (Blank) ភ្លាមៗ
                    scores["_isOtherMode"] = true; // ចំណាំស្ថានភាពថាជា Other Mode
                    
                    // កំណត់លក្ខខណ្ឌស្វ័យប្រវត្តិតាម Logic 
                    scores["ចំណុះឬក្រៅ"] = ""; 
                    scores["មកពីសាលា"] = "សាលាក្រៅគោលដៅ";   
                    
                    renderScores(); 
                    
                    setTimeout(() => {
                        let txtBox = grid.querySelector('input[placeholder="វាយឈ្មោះសាលា..."]');
                        if (txtBox) txtBox.focus();
                    }, 50);
                } else {
                    scores[sub] = value;
                    
                    if (value !== "") {
                        // ប្រសិនបើអ្នកប្រើប្រាស់ចាប់ផ្តើមវាយអក្សរ លុប flag Mode បណ្តោះអាសន្នចេញ
                        delete scores["_isOtherMode"];
                    }

                    // ដំណើរការលក្ខខណ្ឌស្វ័យប្រវត្តិសម្រាប់ការជ្រើសរើស a, b, c
                    if (value === "បឋមផ្សារលើ" || value === "បឋមមិត្តភាព" || value === "បឋមអូរត្រេះ" ) {
                        scores["ចំណុះឬក្រៅ"] = "បឋមចំណុះ";
                        scores["មកពីសាលា"] = "សាលាគោលដៅ";
                    } else if (value === "វិ.ហសមិត្តភាព") {
                        scores["ចំណុះឬក្រៅ"] = "អនុវិ.ចំណុះ";
                        scores["មកពីសាលា"] = "សាលាគោលដៅ";
                    }
                    
                    // ប្រសិនបើមិនមែននៅក្នុង TextBox mode ទេ ធ្វើការ Render ឡើងវិញដើម្បីឱ្យដំណើរការ control statuses
                    if (!isOtherSchool) {
                        renderScores();
                    }
                }
                return; 
            }

            if (sub === "ថ្ងៃខែឆ្នាំកំណើត" && value) {
                if (value.includes('T') || value.includes('GMT')) {
                    scores[sub] = formatDateOnly(value);
                    e.target.value = scores[sub];
                } else {
                    scores[sub] = value;
                }
            } else {
                scores[sub] = value;
            }
        };

        if(sub === "ឈ្មោះសាលារៀនឆ្នាំមុន" && isOtherSchool) {
            div.querySelector('#btnResetSchool').onclick = () => {
                delete scores["_isOtherMode"];
                scores["ឈ្មោះសាលារៀនឆ្នាំមុន"] = "";
                scores["ចំណុះឬក្រៅ"] = "";
                scores["មកពីសាលា"] = "";
                renderScores();
            };
        }

        grid.appendChild(div);
    });
}

function saveToSheet() {
    const btn = document.getElementById('saveBtn');
    const statusMsg = document.getElementById('saveStatus');
    const statusMsgh = document.getElementById('saveStatush');

    for (let key of SUBJECTS) {
        if (!scores[key] || scores[key].toString().trim() === "") {
            statusMsg.style.color = '#CA6F1E';
            statusMsg.textContent = '⚠ សូមបំពេញព័ត៌មានទាំងអស់';
            return;
        }
    }

    if (!currentStudentId) {
        btn.textContent = 'មិនទាន់ជ្រើសសិស្ស!';
        btn.style.backgroundColor = '#e74c3c'; 
        setTimeout(() => {
            btn.textContent = 'រក្សាទុក';
            btn.style.backgroundColor = ''; 
        }, 1500);
        return;
    }

    // Set the dynamic thank you message here
   // Wrap the student's name in a red span tag
    document.getElementById('successMessage').innerHTML = `សិស្សឈ្មោះ​ <span style="color: red; font-weight: bold;">${currentStudentName}</span> ពិតជាសិស្សគំរូមែន🐧`;
    btn.disabled = true;
    showSuccessPopup();

    setTimeout(() => {
        btn.disabled = false;
        statusMsg.textContent = '';
        statusMsgh.textContent = '';
    }, 1500);

    document.getElementById('quickScore').value = '';
    btn.textContent = 'រក្សាទុក';
    
    let sanitizedScores = { ...scores };
    
    SUBJECTS.forEach(sub => {
        if (sub === "ថ្ងៃខែឆ្នាំកំណើត" && sanitizedScores[sub]) {
            sanitizedScores[sub] = formatDateOnly(sanitizedScores[sub]);
        }
        if (sub === "សម័យប្រឡងបឋមភូមិ" && sanitizedScores[sub]) {
            sanitizedScores[sub] = formatToIsoDate(sanitizedScores[sub]);
        }
    });

    fetch(`${SHEET_API_BASE}?action=saveScores&month=${monthSelect.value}`, {
        method: 'POST',
        body: JSON.stringify({ 
            studentId: currentStudentId, 
            studentName: currentStudentName, 
            scores: sanitizedScores 
        })
    }).catch(() => {
        console.error('Save failed');
    });

    setTimeout(() => {
        btn.disabled = false;
    }, 500);
}

document.getElementById('searchName').oninput = e => {
    let term = e.target.value.toLowerCase();
    [...document.getElementById('studentList').children].forEach(div => {
        div.style.display = div.textContent.toLowerCase().includes(term) ? '' : 'none';
    });
};

document.getElementById('saveBtn').onclick = saveToSheet;
document.getElementById('resetBtn').onclick = () => {
    scores = {};
    renderScores();
};
document.getElementById('reloadBtn').onclick = loadStudents;

document.getElementById('backToList').onclick = () => {
    document.querySelector('.panel-list').style.display = 'flex';
    document.getElementById('studentInfoPanel').style.display = 'none';
    document.getElementById('backToList').style.display = 'none';
};

const subjectQuickSelect = document.getElementById('subjectQuick');
subjectQuickSelect.innerHTML = SUBJECTS.map(s => `<option>${s}</option>`).join("");
monthSelect.value = '7-9';

loadStudents();
renderScores();
</script>
