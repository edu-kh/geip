<!DOCTYPE html>

<head>

<title>Geip</title>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(36deg, #44a08d, #093637);
        color: white;
        font-family: "Battambang", system-ui, "Lato", sans-serif;
        font-weight: 300;
        font-size: 20px;
        line-height: 1.5;
        padding-bottom: 60px; /* Prevents content from being hidden behind the fixed footer */
    }

    @media screen and (max-width: 820px) {
      body {
        font-size: 16px;
      }
    }

    header {
        position: sticky;
        top: 0;
        background: #2A394C;
        padding: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        z-index: 10;
        font-family: "Battambang", system-ui;
    }
  
    footer {
        position: fixed; /* Changed from sticky to fixed */
        bottom: 0;
        left: 0;
        right: 0;
        background: #2A394C;
        padding: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: 0 -2px 5px rgba(0,0,0,0.1); /* Inverted shadow direction for bottom bar */
        z-index: 10;
        font-family: "Battambang", system-ui;
    }

    .container {
      width: 80%;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .button-container {
      font-family: "Battambang", system-ui;
      margin: 60px auto 0;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
    }

    @media screen and (max-width: 930px) {
      .button-container {
        flex-direction: column;
        gap: 20px;
      }
    }

    .button {
      font-size: 1.2rem;
      position: relative;
      color: white;
      text-decoration: none;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid white;
      border-radius: 1000px;
      padding: 10px 20px;
      margin: 40px;
      box-shadow: 0 2px 5px 0 rgba(3,6,26,0.15);
      transition: .5s all ease-in-out;
    }

    .button:hover {
        cursor: pointer;
        background: white;
        color: #1F4141;
        animation: none;
    }

    @media screen and (max-width: 930px) {
      .button {
        margin: 10px;
      }
    }

    .button-pulse {
      animation: pulse 2s infinite .1s cubic-bezier(0.25, 0, 0, 1);
      box-shadow: 0 0 0 0 white;
    }

    @keyframes pulse {
      to {
        box-shadow: 0 0 0 18px rgba(255, 255, 255, 0); 
      }
    }

    .button-float {
      animation: float 1.5s linear alternate infinite;
    }

    @keyframes float {
      100% {
        transform: translateY(-18px);
      }
    }

    h1 {
      font-weight: 300;
      font-size: 2em;
      text-align: center;
      line-height: 1.3;
      padding: 40px 20px 0 20px;
    }

    p {
      text-align: center;
      opacity: .8;
    }

    p a {
        color: white;
        text-decoration: none;
        border-bottom: 1px solid white;
        transition: border .3s;
    }

    p a:hover {
        border-bottom: 1px solid rgba(0,0,0,0);
    }
    footer a{
      text-decoration: none;
      color: #4e93e1;
    }
</style>
</head> 
<body>

</header>

<div class="button-container">
  <span style="color: white; font-size: 1.2rem;">សូមជ្រើសកម្រិតថ្នាក់របស់ប្អូន</span>
  <a href="g9.html" class="button button-pulse">ថ្នាក់ទី០៧ ដល់០៩</a>
  <a href="10-12.html" class="button button-pulse">ថ្នាក់ទី១០​ ដល់១២</a>
  <img src="ChatGPT.png" class="button button-pulse" style="height:150px;" alt="ChatGPT"/>
</div>

<footer>
    <label style="width:100%; color: #8efdf0;"><span>បង្កើតដោលោក ពីន គុយ ©2026-2027 <a href="https://t.me/pinkoy2022"><i class="fab fa-telegram"> </i> Telegram</a></span></label>
</footer>

</body>
</html>
